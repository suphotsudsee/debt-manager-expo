name: Build Expo APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Install dependencies
        run: npm install

      - name: Create EAS project
        run: |
          # Set up local build (no EAS account needed)
          eas build:configure -p android

      - name: Build APK locally
        run: npx expo prebuild --platform android --no-install

      - name: Build debug APK with Gradle
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: debt-manager-expo-apk
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Release APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: expo-v${{ github.run_number }}
          files: android/app/build/outputs/apk/debug/*.apk
          generate_release_notes: true